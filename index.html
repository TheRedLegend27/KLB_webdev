<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/custom.css">
    <script defer src="js/bootstrap.bundle.min.js"></script>
    <title>Scavenge & Simmer</title>
</head>

<body class="bg-danger"> <!-- Now using bootstrap -->

<div class="d-flex align-items-center">
  <img src="logo.png" alt="Logo" class="img-fluid me-2" style="height: 100px;">
  <span class="h1 mb-0"><b>Scavenge & Simmer</b></span>
</div>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#Home">Home</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-4 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#Recipes">RECIPES</a>  
        </li>
        <li class="nav-item"><a class="nav-link active" aria-current="page" href="#About">ABOUT</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div id="carouselIndicators" class="carousel slide">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="dataset/image_files/Air-Fried_Zucchini_Chips_1.webp" class="d-block w-50" alt="slide1">
    </div>
    <div class="carousel-item">
      <img src="dataset/image_files/Apple_Cinnamon_Oatmeal_1.webp" class="d-block w-50" alt="slide2">
    </div>
    <div class="carousel-item">
      <img src="dataset/image_files/Apple_Crisp_1.webp" class="d-block w-50" alt="slide3">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
 
</body>
</html>
