<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/custom.css">
  <script defer src="js/bootstrap.bundle.min.js"></script>
  <title>Recipe</title>
</head>

<body class="bg-danger">

<div class="d-flex align-items-center">
  <img src="logo.png" alt="Logo" class="img-fluid me-2" style="height: 100px;">
  <span class="h1 mb-0"><b>Company Secrets</b></span>
</div>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Home</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-4 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" href="index.html#Recipes">RECIPES</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="about.html">ABOUT</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  <a href="index.html">Back to Home</a>
  <div id="recipe-header" class="recipe-header"></div>

  <div class="boxes-grid">
    <div class="textbox" id="box-details">
      <h3>Recipe Information</h3>
      <div id="details-content"></div>
    </div>
    <div class="textbox" id="box-ingredients">
      <h3>Ingredients</h3>
      <ul id="ingredients-content"></ul>
    </div>
    <div class="textbox" id="box-steps">
      <h3>Steps</h3>
      <ol id="steps-content"></ol>
    </div>
  </div>
</div>

<script>
  const recipe = JSON.parse(localStorage.getItem('selectedRecipe'));

  document.getElementById('recipe-header').innerHTML = `
    <h1>${recipe.name}</h1>
    <div class="d-flex gap-2 flex-wrap">${recipe.images.map(img => `<img src="dataset/images/${img}" class="recipe-header">`).join('')}</div>
  `;

  document.getElementById('details-content').innerHTML = `
    <p><strong>Category:</strong> ${recipe.category}</p>
    <p><strong>Cuisine:</strong> ${recipe.cuisine}</p>
    <p><strong>Season:</strong> ${recipe.season}</p>
    <p><strong>Difficulty:</strong> ${recipe.difficulty}</p>
    <p><strong>Prep Time:</strong> ${recipe.prep_time}</p>
    <p><strong>Dietary:</strong> ${recipe.dietary ? recipe.dietary.join(', ') : 'N/A'}</p>
  `;

  document.getElementById('ingredients-content').innerHTML =
    recipe.ingredients.map(i => `<li>${i}</li>`).join('');

  document.getElementById('steps-content').innerHTML =
    recipe.steps.map(s => `<li>${s}</li>`).join('');
</script>
</body>
</html>
