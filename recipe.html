<!-- Function for sharing to twitter -->
<script>
  function shareOnTwitter() {
    const url = encodeURIComponent(window.location.href);
    const text = encodeURIComponent("Check out this recipe I found!");
    const twitterUrl = `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
    window.open(twitterUrl, '_blank');
  }

  //Function for sharing to Facebook
  function shareOnFacebook() {
    const url = encodeURIComponent(window.location.href);
    const facebookUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
    window.open(facebookUrl, '_blank');
  }

  //Function for sharing to Instagram
  //function shareOnInsta() {
   // const url = encodeURIComponent(window.location.href);
    //const insta = ();
    //window.open(insta, '_blank');
  //}
  

  //Function for copying link
  async function copyLink() {
    navigator.clipboard.writeText(window.location.href);
    alert("Link Copied!");
  }

  function renderRecipe(recipe) {
// Gets name
    document.getElementById('recipe-title').textContent = recipe.name;

//Gets images
    document.getElementById('images-content').innerHTML =
      recipe.images.map(img => `<img src="dataset/images/${img}" class="recipe-img">`).join('');

//Gets recipe information
    document.getElementById('details-content').innerHTML = `
      <p><b>Category:</b> ${recipe.category}</p>
      <p><b>Cuisine:</b> ${recipe.cuisine}</p>
      <p><b>Season:</b> ${recipe.season}</p>
      <p><b>Difficulty:</b> ${recipe.difficulty}</p>
      <p><b>Prep Time:</b> ${recipe.prep_time}</p>
      <p><b>Dietary:</b> ${recipe.dietary ? recipe.dietary.join(', ') : 'N/A'}</p>
    `;
//Formatting ingrediants
    document.getElementById('ingredients-content').innerHTML =
      recipe.ingredients.map(i => `<li>${i}</li>`).join('');
//Formatting steps
    document.getElementById('steps-content').innerHTML =
      recipe.steps.map(s => `<li>${s}</li>`).join('');
//Fetching the story from the separate .json file
    fetch('dataset/recipes/All_recipe_stories.json')
      .then(res => res.json())
      .then(stories => {
        const story = stories.find(s => s.id === recipe.id);
        document.getElementById('storytext').textContent = story ? story.story : '';
      });
  setupFavoriteButton(recipe);
  }
  
  const url = new URLSearchParams(window.location.search).get('id');

  if (url) {
    // Load recipe by ID thanks jonah :)
    (async () => {
      const recipes = await fetch('dataset/recipes/all_recipes.json').then(res => res.json());
      const recipe = recipes.find(r => r.id == url);
      if (recipe) {
        localStorage.setItem('selectedRecipe', JSON.stringify(recipe));
        renderRecipe(recipe);
      }
    })();
  }
</script>

<script>
const favBtn = document.getElementById("favoriteBtn");

//Pop up function
function showFavoriteToast(message) {
  const toastEl = document.getElementById("favoriteToast");
  const toastBody = document.getElementById("favoriteToastBody");

  toastBody.textContent = message;

  const toast = bootstrap.Toast.getOrCreateInstance(toastEl, {
    autohide: true,
    delay: 2500
  });

  toast.show();
}

//Favorite
function setupFavoriteButton(recipe) {
  if (!favBtn) return;

  function setFavorited() {
    favBtn.textContent = "Favorited";
    favBtn.classList.remove("btn-secondary");
    favBtn.classList.add("btn-success");
    favBtn.disabled = true;
  }

  if (isFavorite(recipe.id)) {
    setFavorited();
  }

  favBtn.addEventListener("click", () => {
    const added = addToFavorites(recipe);

    if (added) {
      setFavorited();
      showFavoriteToast(`${recipe.name} added to favorites`);
    }
  });
}
</script>
