<!-- Button for back to Home -->
<div class="container py-4">
  <a href="index.html">Back to Home</a>

  <!-- Recipe name -->
  <h1 id="recipe-title" class="text-center fw-bold my-4"></h1>

<!-- Text boxes for each section of the recipe page -->
  <div class="boxes-grid">
    <div class="textbox" id="box-story">
      <h3>Recipe Story</h3>
      <div id="storytext"></div>
    </div>
    <div class="textbox" id="box-images">
      <h3>Images</h3>
      <div id="images-content" class="d-flex gap-2 flex-wrap justify-content-center"></div>
    </div>
    <div class="textbox" id="box-details">
      <h3>Recipe Information</h3>
      <div id="details-content"></div>
    </div>
    <div class="textbox" id="box-ingredients">
      <h3>Ingredients</h3>
      <ul id="ingredients-content"></ul>
    </div>
    <div class="textbox" id="box-steps">
      <h3>Steps</h3>
      <ol id="steps-content"></ol>
    </div>
  </div>
</div>

<!-- Gets selected recipe -->
<script>
  const recipe = JSON.parse(localStorage.getItem('selectedRecipe'));

// Gets name
  document.getElementById('recipe-title').textContent = recipe.name;

//Gets images
  document.getElementById('images-content').innerHTML =
    recipe.images.map(img => `<img src="dataset/images/${img}" class="recipe-img">`).join('');

//Gets recipe information
  document.getElementById('details-content').innerHTML = `
    <p><b>Category:</b> ${recipe.category}</p>
    <p><b>Cuisine:</b> ${recipe.cuisine}</p>
    <p><b>Season:</b> ${recipe.season}</p>
    <p><b>Difficulty:</b> ${recipe.difficulty}</p>
    <p><b>Prep Time:</b> ${recipe.prep_time}</p>
    <p><b>Dietary:</b> ${recipe.dietary ? recipe.dietary.join(', ') : 'N/A'}</p>
  `;
//Formatting ingrediants
  document.getElementById('ingredients-content').innerHTML =
    recipe.ingredients.map(i => `<li>${i}</li>`).join('');
//Formatting steps
  document.getElementById('steps-content').innerHTML =
    recipe.steps.map(s => `<li>${s}</li>`).join('');
//Fetching the story from the separate .json file
  fetch('dataset/recipes/All_recipe_stories.json')
    .then(res => res.json())
    .then(stories => {
      document.getElementById('storytext').textContent = stories.find(s => s.id === recipe.id).story;
    });
</script>
